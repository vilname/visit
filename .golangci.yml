run:
  timeout: 5m
  tests: true
  exclude-dirs:
    - vendor
    - bin
    - scripts

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - gocyclo
    - gocognit
    - gosec
    - prealloc
    - revive
    - stylecheck
    - unconvert
    - unparam

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/yourusername/yourproject

  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gosec:
    excludes:
      - G104 # Errors unhandled
    severity: "medium"
    confidence: "medium"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - funlen

    - path: main\.go
      linters:
        - gocyclo

    - linters:
        - staticcheck
      text: "SA1019"